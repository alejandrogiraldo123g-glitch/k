<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexsus21 - IA Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0b0f19; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: #131c2e;
            border-radius: 15px;
            border: 1px solid #00ff66; /* Verde cibernético de activo */
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 600px;
        }
        .chat-header {
            background: #1c2a45;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #00ff66;
        }
        .chat-header h1 { font-size: 1.5em; color: #00ff66; }
        .estado { font-size: 0.8em; color: #00ff66; font-weight: bold; margin-top: 5px; }
        .chat-header img { width: 50px; height: 50px; border-radius: 50px; margin-top: 10px; border: 2px solid #00ff66; object-fit: cover; }
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message { padding: 10px 15px; border-radius: 10px; max-width: 80%; line-height: 1.4; }
        .user-msg { background: #00ff66; color: #000; align-self: flex-end; font-weight: 500; }
        .bot-msg { background: #22314d; color: #fff; align-self: flex-start; border-left: 3px solid #00ff66; }
        .input-area { display: flex; padding: 10px; background: #1c2a45; gap: 10px; }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #22314d;
            border-radius: 8px;
            background: #0b0f19;
            color: white;
            outline: none;
        }
        input:focus { border-color: #00ff66; }
        button {
            padding: 0 20px;
            background: #00ff66;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #00cc52; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>Nexsus21</h1>
        <div class="estado" id="statusLabel">🟢 CONECTADO (Vía n8n)</div>
        <img src="https://images.ecestaticos.com/ad-CsJ33cti4Dw5WAPofxTVYV24=/0x424:2273x1701/1338x752/filters:fill(white):format(jpg)/f.elconfidencial.com%2Foriginal%2F700%2F6c4%2F3f5%2F7006c43f5ac22088236eda758ec8446a.jpg" alt="Nexsus Avatar">
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">¡Conexión exitosa! Soy Nexsus21. ¿De qué quieres hablar hoy?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe un mensaje aquí..." onkeypress="evaluarEnter(event)">
        <button onclick="enviarMensaje()">Enviar</button>
    </div>
</div>

<script>
    // ⚠️ REEMPLAZA ESTE ENLACE POR TU URL DE WEBHOOK DE N8N CUANDO LA TENGAS
    const N8N_WEBHOOK_URL = "https://tu-instancia.n8n.cloud/webhook/tu-identificador";

    function evaluarEnter(e) {
        if (e.key === 'Enter') enviarMensaje();
    }

    async function enviarMensaje() {
        let input = document.getElementById("userInput");
        let mensajeTexto = input.value.trim();
        if (mensajeTexto === "") return;

        // Mostrar mensaje del usuario en pantalla
        agregarMensaje(mensajeTexto, 'user-msg');
        input.value = "";

        // Mostrar indicador de que la IA está "pensando..."
        let indicadorPensando = document.createElement("div");
        indicadorPensando.className = "message bot-msg";
        indicadorPensando.innerText = "Nexsus21 está pensando...";
        document.getElementById("chatBox").appendChild(indicadorPensando);

        try {
            // AQUÍ SE ENVÍA EL MENSAJE A N8N
            let respuesta = await fetch(N8N_WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ mensaje: mensajeTexto })
            });

            let datos = await respuesta.json();
            
            // Quitar el indicador de pensando
            indicadorPensando.remove();

            // Mostrar la respuesta real que mandó n8n (asumiendo que n8n devuelve { respuesta: "texto" })
            agregarMensaje(datos.respuesta || "Mensaje recibido por n8n, pero no obtuve respuesta en texto.", 'bot-msg');

        } catch (error) {
            indicadorPensando.remove();
            agregarMensaje("Error al conectar con n8n. Revisa si tu workflow está activo o la URL es correcta.", 'bot-msg');
            console.error("Error:", error);
        }
    }

    function agregarMensaje(texto, tipo) {
        let chatBox = document.getElementById("chatBox");
        let div = document.createElement("div");
        div.className = "message " + tipo;
        div.innerText = texto;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
